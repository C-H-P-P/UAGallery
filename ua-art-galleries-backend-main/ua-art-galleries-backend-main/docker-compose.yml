  # === BACKEND (Django) ===
  backend:
    build: ./backend
    # 👇 ЗМІНА 1: Прибрали wait-for-db.sh. Neon працює завжди, чекати не треба.
    command: sh -c "python manage.py migrate --noinput && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
  
    env_file:
      - ./backend/.env 
    
   
    
    extra_hosts:
      - "host.docker.internal:host-gateway"

